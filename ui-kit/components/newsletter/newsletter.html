<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"></head>
<body class="bg-pck-cream m-0 py-16 px-4">

<div id="pck-newsletter" class="font-sans max-w-xl mx-auto">
  <div class="relative bg-white rounded-2xl border border-pck-line/60 p-10 md:p-12 text-center shadow-pck overflow-hidden">
    <div class="absolute -top-24 -right-24 w-48 h-48 rounded-full bg-pck-gold/10 blur-2xl"></div>
    <div class="relative">
      <div class="w-12 h-12 mx-auto rounded-full bg-pck-cream flex items-center justify-center text-pck-gold mb-5">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
      </div>
      <p class="text-[10px] font-bold uppercase tracking-[0.25em] text-pck-gold mb-2">The guest list</p>
      <h2 class="font-serif text-3xl text-pck-ink">Insider access</h2>
      <p class="mt-2 text-sm text-pck-muted leading-relaxed max-w-sm mx-auto">Seasonal rates, harvest events, and direct-booking perks — delivered quietly to your inbox.</p>
      <form class="mt-8 flex flex-col sm:flex-row gap-2 max-w-md mx-auto" action="#" method="post">
        <label class="sr-only" for="pck-nl-email">Email</label>
        <input type="email" id="pck-nl-email" required placeholder="you@example.com" class="flex-1 px-5 py-3.5 text-sm bg-pck-surface border border-pck-line rounded-full focus:outline-none focus:ring-2 focus:ring-pck-accent/20 focus:border-pck-accent transition-shadow">
        <button type="submit" class="px-7 py-3.5 bg-pck-ink text-white text-sm font-semibold rounded-full hover:bg-pck-accent transition-colors shrink-0">Subscribe</button>
      </form>
      <p class="mt-4 text-[10px] text-pck-muted/80">Replace form action with your Mailchimp or Klaviyo URL.</p>
    </div>
  </div>
</div>

<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={important:"#pck-newsletter",theme:{extend:{colors:{pck:{ink:"#0c0a09",muted:"#78716c",surface:"#fafaf9",cream:"#f5f0eb",accent:"#1e3a5f",gold:"#a6833d",line:"#e7e5e4"}},fontFamily:{serif:["Georgia","Cambria","Times New Roman","serif"],sans:["system-ui","-apple-system","Segoe UI","Roboto","sans-serif"]},boxShadow:{pck:"0 25px 50px -12px rgba(0,0,0,0.08)"}}}};</script>
</body></html>
