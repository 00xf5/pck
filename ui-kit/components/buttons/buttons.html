<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"></head>
<body class="bg-pck-cream m-0 p-10">

<div id="pck-buttons" class="font-sans max-w-xl mx-auto">
  <div class="bg-white rounded-2xl border border-pck-line/80 shadow-pck overflow-hidden">
    <div class="px-8 pt-8 pb-2 border-b border-pck-line/60">
      <p class="text-[10px] font-bold uppercase tracking-[0.25em] text-pck-gold">Components</p>
      <h2 class="font-serif text-2xl text-pck-ink mt-1">Button collection</h2>
    </div>
    <div class="p-8 space-y-8">
      <div>
        <p class="text-[11px] font-medium uppercase tracking-wider text-pck-muted mb-4">Primary actions</p>
        <div class="flex flex-wrap gap-3">
          <a href="#" class="group inline-flex items-center gap-2 px-7 py-3.5 bg-pck-accent text-white text-sm font-semibold rounded-full shadow-lg shadow-pck-accent/25 hover:bg-pck-ink hover:shadow-xl hover:-translate-y-0.5 transition-all duration-300">Reserve your stay<span class="opacity-70 group-hover:translate-x-0.5 transition-transform">→</span></a>
          <a href="#" class="inline-flex items-center px-7 py-3.5 bg-pck-gold text-white text-sm font-semibold rounded-full shadow-md hover:bg-pck-gold/90 hover:-translate-y-0.5 transition-all duration-300">Limited availability</a>
        </div>
      </div>
      <div>
        <p class="text-[11px] font-medium uppercase tracking-wider text-pck-muted mb-4">Secondary &amp; ghost</p>
        <div class="flex flex-wrap gap-3">
          <a href="#" class="inline-flex px-6 py-3 border-2 border-pck-ink/90 text-pck-ink text-sm font-semibold rounded-full hover:bg-pck-ink hover:text-white transition-all duration-300">View suites</a>
          <a href="#" class="inline-flex px-6 py-3 text-pck-accent text-sm font-semibold rounded-full hover:bg-pck-accent/5 transition-colors">Explore the estate →</a>
        </div>
      </div>
      <div>
        <p class="text-[11px] font-medium uppercase tracking-wider text-pck-muted mb-4">On dark backgrounds</p>
        <div class="rounded-xl bg-pck-ink p-6 flex flex-wrap gap-3">
          <a href="#" class="inline-flex px-6 py-3 bg-white text-pck-ink text-sm font-semibold rounded-full hover:bg-pck-cream transition-colors">Check dates</a>
          <a href="#" class="inline-flex px-6 py-3 border border-white/30 text-white text-sm font-semibold rounded-full hover:bg-white/10 transition-colors">Virtual tour</a>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={important:"#pck-buttons",theme:{extend:{colors:{pck:{ink:"#0c0a09",muted:"#78716c",surface:"#fafaf9",cream:"#f5f0eb",accent:"#1e3a5f",gold:"#a6833d",line:"#e7e5e4"}},fontFamily:{serif:["Georgia","Cambria","Times New Roman","serif"],sans:["system-ui","-apple-system","Segoe UI","Roboto","sans-serif"]},boxShadow:{pck:"0 25px 50px -12px rgba(0,0,0,0.1)",}}}};</script>
</body></html>
