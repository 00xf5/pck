<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"></head>
<body class="bg-pck-cream m-0 p-10">

<div id="pck-badge-pills" class="font-sans max-w-lg mx-auto">
  <div class="bg-white rounded-2xl border border-pck-line/60 p-8 shadow-sm">
    <p class="text-[10px] font-bold uppercase tracking-[0.25em] text-pck-gold mb-6">Labels &amp; status tags</p>
    <div class="flex flex-wrap gap-2.5">
      <span class="inline-flex items-center gap-1.5 px-3.5 py-1.5 bg-pck-accent text-white text-[11px] font-bold uppercase tracking-wider rounded-full shadow-sm"><span class="w-1.5 h-1.5 rounded-full bg-pck-gold"></span>Best seller</span>
      <span class="px-3.5 py-1.5 bg-pck-gold/15 text-pck-gold text-[11px] font-bold uppercase tracking-wider rounded-full border border-pck-gold/25">New suite</span>
      <span class="px-3.5 py-1.5 bg-pck-cream text-pck-muted text-[11px] font-medium rounded-full border border-pck-line">Pet friendly</span>
      <span class="px-3.5 py-1.5 bg-emerald-50 text-emerald-800 text-[11px] font-semibold rounded-full">Direct booking −10%</span>
      <span class="px-3.5 py-1.5 bg-pck-ink text-white text-[11px] font-bold uppercase tracking-wider rounded-full">Only 2 left</span>
      <span class="px-3.5 py-1.5 border border-dashed border-pck-line text-pck-muted text-[11px] font-medium rounded-full italic">Harvest season</span>
    </div>
    <p class="mt-8 text-xs text-pck-muted leading-relaxed">Drop any pill onto cards, heroes, or pricing tables. Mix and match freely.</p>
  </div>
</div>

<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={important:"#pck-badge-pills",theme:{extend:{colors:{pck:{ink:"#0c0a09",muted:"#78716c",surface:"#fafaf9",cream:"#f5f0eb",accent:"#1e3a5f",gold:"#a6833d",line:"#e7e5e4"}},fontFamily:{serif:["Georgia","Cambria","Times New Roman","serif"],sans:["system-ui","-apple-system","Segoe UI","Roboto","sans-serif"]}}}};</script>
</body></html>
