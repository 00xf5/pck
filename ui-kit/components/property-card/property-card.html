<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>html:not(.pck-tw-ready){visibility:hidden}@media (prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important;scroll-behavior:auto!important}}</style><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-pck-cream m-0 p-10">

<div id="pck-property-card" class="font-sans max-w-[22rem] mx-auto">
  <article class="group bg-white rounded-2xl overflow-hidden border border-pck-line/70 shadow-pck hover:shadow-2xl hover:-translate-y-1 transition-all duration-500">
    <div class="relative aspect-[4/5] overflow-hidden">
      <img loading="lazy" decoding="async" src="https://images.unsplash.com/photo-1600607687939-ce8a6c25118c?w=800&q=85" alt="" class="absolute inset-0 w-full h-full object-cover group-hover:scale-105 transition-transform duration-700 ease-out">
      <div class="absolute inset-0 bg-gradient-to-t from-pck-ink/70 via-transparent to-transparent opacity-80"></div>
      <div class="absolute top-4 left-4 flex gap-2">
        <span class="px-3 py-1 bg-white/95 backdrop-blur text-pck-gold text-[10px] font-bold uppercase tracking-wider rounded-full shadow-sm">Editor's pick</span>
      </div>
      <button type="button" class="absolute top-4 right-4 w-9 h-9 rounded-full bg-white/90 backdrop-blur flex items-center justify-center text-pck-muted hover:text-red-500 transition-colors" aria-label="Save">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      </button>
      <div class="absolute bottom-4 left-4 right-4">
        <p class="text-white/70 text-xs flex items-center gap-1"><svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg> Montepulciano</p>
        <h3 class="font-serif text-2xl text-white mt-1">Garden Suite</h3>
      </div>
    </div>
    <div class="p-5">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-1 text-pck-gold text-sm">★★★★★ <span class="text-pck-muted text-xs ml-1">(48)</span></div>
        <div class="text-right">
          <p class="text-xs text-pck-muted line-through">$320</p>
          <p class="text-xl font-semibold text-pck-ink">$285 <span class="text-sm font-normal text-pck-muted">/ night</span></p>
        </div>
      </div>
      <p class="mt-3 text-sm text-pck-muted">King bed · Private terrace · Vineyard view</p>
      <a href="#" class="mt-5 flex items-center justify-center gap-2 w-full py-3 bg-pck-ink text-white text-sm font-semibold rounded-full hover:bg-pck-accent transition-colors duration-300">View suite →</a>
    </div>
  </article>
</div>


<script>tailwind.config={important:"#pck-property-card",theme:{extend:{colors:{pck:{ink:"#0c0a09",muted:"#78716c",surface:"#fafaf9",cream:"#f5f0eb",accent:"#1e3a5f",gold:"#a6833d",line:"#e7e5e4"}},fontFamily:{serif:["Georgia","Cambria","Times New Roman","serif"],sans:["system-ui","-apple-system","Segoe UI","Roboto","sans-serif"]},boxShadow:{pck:"0 25px 50px -12px rgba(0,0,0,0.12)"}}}};document.documentElement.classList.add('pck-tw-ready');</script>
</body></html>
