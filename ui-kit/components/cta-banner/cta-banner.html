<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>html:not(.pck-tw-ready){visibility:hidden}@media (prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important;scroll-behavior:auto!important}}</style><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-pck-cream m-0 py-16 px-4">

<div id="pck-cta-banner" class="font-sans max-w-5xl mx-auto">
  <div class="relative overflow-hidden rounded-2xl bg-pck-accent px-8 py-12 md:px-14 md:py-16 md:flex md:items-center md:justify-between gap-10 shadow-2xl shadow-pck-accent/25">
    <div class="absolute inset-0 opacity-30" style="background-image:url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=1200&q=80');background-size:cover;background-position:center"></div>
    <div class="absolute inset-0 bg-gradient-to-r from-pck-accent via-pck-accent/95 to-pck-accent/80"></div>
    <div class="absolute -right-20 -top-20 w-64 h-64 rounded-full bg-pck-gold/20 blur-3xl"></div>
    <div class="relative max-w-lg">
      <p class="text-[10px] font-bold uppercase tracking-[0.25em] text-pck-gold mb-3">Book direct</p>
      <h2 class="font-serif text-3xl md:text-4xl text-white leading-tight">Save 10% when you reserve on our site</h2>
      <p class="mt-3 text-sm text-white/75 leading-relaxed">No platform fees. Flexible rebooking. Best-price guarantee — always.</p>
    </div>
    <div class="relative mt-8 md:mt-0 shrink-0 w-full md:w-auto flex flex-col gap-3">
      <a href="#" class="inline-flex justify-center items-center gap-2 px-8 py-4 bg-white text-pck-accent text-sm font-semibold rounded-full shadow-xl hover:bg-pck-cream hover:-translate-y-0.5 transition-all duration-300">Check dates<span>→</span></a>
      <p class="text-center md:text-right text-[11px] text-white/50">Free cancellation · 14 days</p>
    </div>
  </div>
</div>


<script>tailwind.config={important:"#pck-cta-banner",theme:{extend:{colors:{pck:{ink:"#0c0a09",muted:"#78716c",surface:"#fafaf9",cream:"#f5f0eb",accent:"#1e3a5f",gold:"#a6833d",line:"#e7e5e4"}},fontFamily:{serif:["Georgia","Cambria","Times New Roman","serif"],sans:["system-ui","-apple-system","Segoe UI","Roboto","sans-serif"]}}}};document.documentElement.classList.add('pck-tw-ready');</script>
</body></html>
