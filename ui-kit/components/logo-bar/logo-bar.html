<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>html:not(.pck-tw-ready){visibility:hidden}</style><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-white m-0 py-16 px-4">

<div id="pck-logo-bar" class="font-sans max-w-5xl mx-auto">
  <p class="text-center text-[10px] font-bold uppercase tracking-[0.3em] text-pck-muted mb-10">As featured in</p>
  <div class="flex flex-wrap items-center justify-center gap-x-12 gap-y-6 md:gap-x-16 opacity-40 hover:opacity-60 transition-opacity duration-500">
    <span class="font-serif text-xl md:text-2xl tracking-[0.15em] text-pck-ink">VOGUE</span>
    <span class="font-serif text-lg md:text-xl tracking-[0.12em] text-pck-ink italic">Condé Nast Traveller</span>
    <span class="font-serif text-xl md:text-2xl tracking-[0.2em] text-pck-ink">MONOCLE</span>
    <span class="font-serif text-lg md:text-xl tracking-widest text-pck-ink">AFAR</span>
    <span class="font-serif text-xl md:text-2xl tracking-[0.1em] text-pck-ink">DESIGN<span class="text-pck-gold">*</span>MILAN</span>
  </div>
</div>


<script>tailwind.config={important:"#pck-logo-bar",theme:{extend:{colors:{pck:{ink:"#0c0a09",muted:"#78716c",surface:"#fafaf9",cream:"#f5f0eb",accent:"#1e3a5f",gold:"#a6833d",line:"#e7e5e4"}},fontFamily:{serif:["Georgia","Cambria","Times New Roman","serif"],sans:["system-ui","-apple-system","Segoe UI","Roboto","sans-serif"]}}}};document.documentElement.classList.add('pck-tw-ready');</script>
</body></html>
