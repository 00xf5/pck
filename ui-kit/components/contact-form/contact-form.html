<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"></head>
<body class="bg-pck-cream m-0 py-16 px-4">

<div id="pck-contact-form" class="font-sans max-w-lg mx-auto">
  <div class="bg-white rounded-2xl border border-pck-line/60 shadow-pck overflow-hidden">
    <div class="bg-pck-accent px-8 py-8 text-white">
      <p class="text-[10px] font-bold uppercase tracking-[0.2em] text-white/50 mb-1">Enquiries</p>
      <h2 class="font-serif text-2xl">Plan your stay</h2>
      <p class="mt-2 text-sm text-white/65">We respond within 24 hours — often sooner.</p>
    </div>
    <form class="p-8 space-y-5" action="#" method="post">
      <div class="grid sm:grid-cols-2 gap-4">
        <div>
          <label for="pck-cf-name" class="block text-[11px] font-semibold uppercase tracking-wider text-pck-muted mb-2">Name</label>
          <input type="text" id="pck-cf-name" required class="w-full px-4 py-3 text-sm bg-pck-surface border border-pck-line/80 rounded-xl focus:outline-none focus:ring-2 focus:ring-pck-accent/20 focus:border-pck-accent transition-shadow">
        </div>
        <div>
          <label for="pck-cf-email" class="block text-[11px] font-semibold uppercase tracking-wider text-pck-muted mb-2">Email</label>
          <input type="email" id="pck-cf-email" required class="w-full px-4 py-3 text-sm bg-pck-surface border border-pck-line/80 rounded-xl focus:outline-none focus:ring-2 focus:ring-pck-accent/20 focus:border-pck-accent transition-shadow">
        </div>
      </div>
      <div>
        <label for="pck-cf-dates" class="block text-[11px] font-semibold uppercase tracking-wider text-pck-muted mb-2">Preferred dates</label>
        <input type="text" id="pck-cf-dates" placeholder="e.g. 12 – 18 August 2025" class="w-full px-4 py-3 text-sm bg-pck-surface border border-pck-line/80 rounded-xl focus:outline-none focus:ring-2 focus:ring-pck-accent/20 focus:border-pck-accent transition-shadow">
      </div>
      <div>
        <label for="pck-cf-msg" class="block text-[11px] font-semibold uppercase tracking-wider text-pck-muted mb-2">Message</label>
        <textarea id="pck-cf-msg" rows="4" required placeholder="Tell us about your stay…" class="w-full px-4 py-3 text-sm bg-pck-surface border border-pck-line/80 rounded-xl resize-y focus:outline-none focus:ring-2 focus:ring-pck-accent/20 focus:border-pck-accent transition-shadow"></textarea>
      </div>
      <button type="submit" class="w-full py-3.5 bg-pck-ink text-white text-sm font-semibold rounded-full hover:bg-pck-accent transition-colors duration-300">Send enquiry →</button>
    </form>
  </div>
</div>

<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={important:"#pck-contact-form",theme:{extend:{colors:{pck:{ink:"#0c0a09",muted:"#78716c",surface:"#fafaf9",cream:"#f5f0eb",accent:"#1e3a5f",gold:"#a6833d",line:"#e7e5e4"}},fontFamily:{serif:["Georgia","Cambria","Times New Roman","serif"],sans:["system-ui","-apple-system","Segoe UI","Roboto","sans-serif"]},boxShadow:{pck:"0 25px 50px -12px rgba(0,0,0,0.1)"}}}};</script>
</body></html>
