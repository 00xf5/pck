<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>html:not(.pck-tw-ready){visibility:hidden}@media (prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important;scroll-behavior:auto!important}}</style><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-pck-ink m-0 py-16 px-4">

<div id="pck-stats-row" class="font-sans max-w-5xl mx-auto">
  <div class="grid grid-cols-2 md:grid-cols-4 gap-px rounded-2xl overflow-hidden ring-1 ring-white/10">
    <div class="bg-white/5 backdrop-blur-sm py-10 px-6 text-center hover:bg-white/10 transition-colors">
      <p class="font-serif text-4xl md:text-5xl text-white tabular-nums">4.97</p>
      <p class="mt-2 text-[10px] font-bold uppercase tracking-[0.2em] text-white/40">Guest rating</p>
    </div>
    <div class="bg-white/5 backdrop-blur-sm py-10 px-6 text-center hover:bg-white/10 transition-colors">
      <p class="font-serif text-4xl md:text-5xl text-white tabular-nums">320<span class="text-2xl text-pck-gold">+</span></p>
      <p class="mt-2 text-[10px] font-bold uppercase tracking-[0.2em] text-white/40">Stays hosted</p>
    </div>
    <div class="bg-white/5 backdrop-blur-sm py-10 px-6 text-center hover:bg-white/10 transition-colors">
      <p class="font-serif text-4xl md:text-5xl text-white tabular-nums">6</p>
      <p class="mt-2 text-[10px] font-bold uppercase tracking-[0.2em] text-white/40">Private suites</p>
    </div>
    <div class="bg-white/5 backdrop-blur-sm py-10 px-6 text-center hover:bg-white/10 transition-colors">
      <p class="font-serif text-4xl md:text-5xl text-pck-gold tabular-nums">24/7</p>
      <p class="mt-2 text-[10px] font-bold uppercase tracking-[0.2em] text-white/40">Concierge</p>
    </div>
  </div>
</div>


<script>tailwind.config={important:"#pck-stats-row",theme:{extend:{colors:{pck:{ink:"#0c0a09",muted:"#78716c",surface:"#fafaf9",cream:"#f5f0eb",accent:"#1e3a5f",gold:"#a6833d",line:"#e7e5e4"}},fontFamily:{serif:["Georgia","Cambria","Times New Roman","serif"],sans:["system-ui","-apple-system","Segoe UI","Roboto","sans-serif"]}}}};document.documentElement.classList.add('pck-tw-ready');</script>
</body></html>
