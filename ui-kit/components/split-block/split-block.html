<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>html:not(.pck-tw-ready){visibility:hidden}</style><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-pck-cream m-0 py-16 px-4">

<div id="pck-split-block" class="font-sans max-w-6xl mx-auto">
  <div class="grid md:grid-cols-2 rounded-2xl overflow-hidden shadow-pck border border-pck-line/60 bg-white">
    <div class="relative min-h-[280px] sm:min-h-[320px] md:min-h-[400px] lg:min-h-[480px] overflow-hidden group">
      <img src="https://images.unsplash.com/photo-1613490493574-7fde63acd811?w=900&q=85" alt="" class="absolute inset-0 w-full h-full object-cover group-hover:scale-105 transition-transform duration-700">
      <div class="absolute inset-0 bg-pck-ink/10"></div>
    </div>
    <div class="p-8 sm:p-10 lg:p-14 flex flex-col justify-center">
      <p class="text-[10px] font-bold uppercase tracking-[0.25em] text-pck-gold mb-4">Our story</p>
      <h2 class="font-serif text-3xl lg:text-4xl text-pck-ink leading-tight">A villa restored<br><span class="italic text-pck-muted">with reverence</span></h2>
      <p class="mt-5 text-pck-muted leading-relaxed">Original stone walls from 1782. Contemporary comfort woven through every suite — natural linens, local art, and windows that frame the Val d'Orcia like paintings.</p>
      <p class="mt-4 text-pck-muted leading-relaxed">We believe luxury is not excess. It is the space to breathe.</p>
      <a href="#" class="mt-8 inline-flex items-center gap-2 text-sm font-semibold text-pck-accent group">
        <span class="border-b border-pck-accent/40 group-hover:border-pck-accent pb-0.5 transition-colors">Discover the estate</span>
        <span class="group-hover:translate-x-1 transition-transform">→</span>
      </a>
    </div>
  </div>
</div>


<script>tailwind.config={important:"#pck-split-block",theme:{extend:{colors:{pck:{ink:"#0c0a09",muted:"#78716c",surface:"#fafaf9",cream:"#f5f0eb",accent:"#1e3a5f",gold:"#a6833d",line:"#e7e5e4"}},fontFamily:{serif:["Georgia","Cambria","Times New Roman","serif"],sans:["system-ui","-apple-system","Segoe UI","Roboto","sans-serif"]},boxShadow:{pck:"0 25px 50px -12px rgba(0,0,0,0.1)"}}}};document.documentElement.classList.add('pck-tw-ready');</script>
</body></html>
