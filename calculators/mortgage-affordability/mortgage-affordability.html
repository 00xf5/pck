<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mortgage Affordability Calculator</title>
  <style>
    @media (prefers-reduced-motion: reduce) {
      .pck-mortgage-calc *, .pck-mortgage-calc *::before, .pck-mortgage-calc *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
    body:has(> .pck-mortgage-calc) {
      margin: 0; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center;
      padding: 2rem 1.25rem; background: #f5f0eb;
    }
  </style>
</head>
<body>

<div class="pck-mortgage-calc" id="pck-mortgage-calc">

  <div class="ma-shell">
    <div class="ma-result">
      <p class="ma-kicker">Affordable home price</p>
      <p class="ma-price" id="pck-ma-out-price">—</p>
      <dl class="ma-summary">
        <div><dt>Monthly housing</dt><dd id="pck-ma-out-total">—</dd></div>
        <div><dt>Max loan</dt><dd id="pck-ma-out-loan">—</dd></div>
      </dl>
      <div class="ma-dti">
        <div class="ma-dti-item">
          <div class="ma-dti-top"><span>Front-end DTI</span><strong id="pck-ma-out-front">—</strong></div>
          <div class="ma-bar"><div class="ma-bar-fill" id="pck-ma-bar-front"></div><i class="ma-bar-mark" style="left:28%"></i></div>
          <span class="ma-dti-hint">28% guideline</span>
        </div>
        <div class="ma-dti-item">
          <div class="ma-dti-top"><span>Back-end DTI</span><strong id="pck-ma-out-back">—</strong></div>
          <div class="ma-bar"><div class="ma-bar-fill" id="pck-ma-bar-back"></div><i class="ma-bar-mark" style="left:36%"></i></div>
          <span class="ma-dti-hint">36% guideline</span>
        </div>
      </div>
      <p class="ma-note" id="pck-ma-out-status" aria-live="polite"></p>
    </div>

    <div class="ma-form">
      <div class="ma-currency">
        <label for="pck-ma-currency">Currency</label>
        <div class="ma-input ma-input--select">
          <select id="pck-ma-currency" aria-label="Currency"></select>
        </div>
      </div>
      <div class="ma-fields">
        <label class="ma-field ma-field--wide">
          <span>Annual income</span>
          <div class="ma-input"><span class="ma-affix ma-affix--cur"></span><input type="number" id="pck-ma-income" value="85000" min="0" step="1000" inputmode="decimal"></div>
        </label>
        <label class="ma-field">
          <span>Monthly debts</span>
          <div class="ma-input"><span class="ma-affix ma-affix--cur"></span><input type="number" id="pck-ma-debts" value="450" min="0" step="50" inputmode="decimal"></div>
        </label>
        <label class="ma-field">
          <span>Down payment</span>
          <div class="ma-input"><span class="ma-affix ma-affix--cur"></span><input type="number" id="pck-ma-down" value="40000" min="0" step="1000" inputmode="decimal"></div>
        </label>
        <label class="ma-field">
          <span>Interest rate</span>
          <div class="ma-input"><input type="number" id="pck-ma-rate" value="6.5" min="0" max="30" step="0.125" inputmode="decimal"><span class="ma-affix">%</span></div>
        </label>
        <label class="ma-field ma-field--wide">
          <span>Loan term</span>
          <div class="ma-input ma-input--select">
            <select id="pck-ma-term">
              <option value="15">15 years</option>
              <option value="20">20 years</option>
              <option value="30" selected>30 years</option>
            </select>
          </div>
        </label>
      </div>
      <details class="ma-more">
        <summary>Tax, insurance &amp; service fees</summary>
        <div class="ma-fields ma-fields--stack">
          <label class="ma-field ma-field--wide">
            <span>Property tax (annual)</span>
            <div class="ma-input"><span class="ma-affix ma-affix--cur"></span><input type="number" id="pck-ma-tax" value="3600" min="0" step="100" inputmode="decimal"></div>
          </label>
          <label class="ma-field">
            <span>Insurance (monthly)</span>
            <div class="ma-input"><span class="ma-affix ma-affix--cur"></span><input type="number" id="pck-ma-insurance" value="120" min="0" step="10" inputmode="decimal"></div>
          </label>
          <label class="ma-field">
            <span>Service fees (monthly)</span>
            <div class="ma-input"><span class="ma-affix ma-affix--cur"></span><input type="number" id="pck-ma-hoa" value="0" min="0" step="25" inputmode="decimal"></div>
          </label>
        </div>
      </details>
    </div>
  </div>

  <p class="ma-foot">Estimates only — not financial advice.</p>
</div>

<style>
  .pck-mortgage-calc {
    --w-bg: #fff;
    --w-surface: #fafaf9;
    --w-ink: #1c1917;
    --w-muted: #78716c;
    --w-accent: #0a0a0a;
    --w-gold: #92690e;
    --w-line: #e7e5e4;
    --w-ok: #166534;
    --w-ok-bg: #f0fdf4;
    --w-warn: #a16207;
    --w-warn-bg: #fffbeb;
    --w-bad: #b91c1c;
    --w-bad-bg: #fef2f2;
    width: 100%;
    max-width: 26rem;
    border: 1px solid var(--w-line);
    border-radius: 12px;
    background: var(--w-bg);
    box-shadow: 0 1px 3px rgba(28,25,23,0.06), 0 8px 24px rgba(28,25,23,0.06);
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    font-size: 15px;
    line-height: 1.5;
    color: var(--w-ink);
    overflow: hidden;
  }
  .pck-mortgage-calc *, .pck-mortgage-calc *::before, .pck-mortgage-calc *::after { box-sizing: border-box; }

  .pck-mortgage-calc .ma-shell { display: flex; flex-direction: column; }

  .pck-mortgage-calc .ma-result {
    padding: 1.5rem 1.375rem;
    background: var(--w-accent);
    color: #fff;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  .pck-mortgage-calc .ma-kicker {
    margin: 0 0 0.25rem;
    font-size: 0.8125rem;
    font-weight: 500;
    color: rgba(255,255,255,0.75);
  }
  .pck-mortgage-calc .ma-price {
    margin: 0 0 1.25rem;
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1.05;
    font-variant-numeric: tabular-nums;
  }

  .pck-mortgage-calc .ma-summary {
    margin: 0 0 1.125rem;
    padding: 0;
    display: grid;
    gap: 0;
    border-top: 1px solid rgba(255,255,255,0.15);
  }
  .pck-mortgage-calc .ma-summary > div {
    display: flex;
    justify-content: space-between;
    gap: 1rem;
    padding: 0.625rem 0;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    font-size: 0.8125rem;
  }
  .pck-mortgage-calc .ma-summary dt { margin: 0; font-weight: 400; color: rgba(255,255,255,0.8); }
  .pck-mortgage-calc .ma-summary dd { margin: 0; font-weight: 600; font-variant-numeric: tabular-nums; }

  .pck-mortgage-calc .ma-dti { display: grid; gap: 0.875rem; }
  .pck-mortgage-calc .ma-dti-top {
    display: flex;
    justify-content: space-between;
    font-size: 0.75rem;
    margin-bottom: 0.375rem;
  }
  .pck-mortgage-calc .ma-dti-top span { color: rgba(255,255,255,0.75); }
  .pck-mortgage-calc .ma-dti-top strong { font-variant-numeric: tabular-nums; }
  .pck-mortgage-calc .ma-bar {
    position: relative;
    height: 6px;
    background: rgba(0,0,0,0.25);
    border-radius: 999px;
    overflow: hidden;
  }
  .pck-mortgage-calc .ma-bar-fill {
    height: 100%;
    width: 0;
    border-radius: 999px;
    background: #86efac;
    transition: width 0.35s ease, background 0.2s;
  }
  .pck-mortgage-calc .ma-bar-fill--warn { background: #fcd34d; }
  .pck-mortgage-calc .ma-bar-fill--bad { background: #fca5a5; }
  .pck-mortgage-calc .ma-bar-mark {
    position: absolute;
    top: -2px;
    width: 1px;
    height: 10px;
    background: rgba(255,255,255,0.6);
    transform: translateX(-50%);
    pointer-events: none;
  }
  .pck-mortgage-calc .ma-dti-hint {
    display: block;
    margin-top: 0.25rem;
    font-size: 0.6875rem;
    color: rgba(255,255,255,0.5);
  }

  .pck-mortgage-calc .ma-note {
    margin: 1rem 0 0;
    padding: 0.5rem 0.75rem;
    font-size: 0.75rem;
    font-weight: 500;
    border-radius: 6px;
  }
  .pck-mortgage-calc .ma-note:empty { display: none; }
  .pck-mortgage-calc .ma-note--ok { background: var(--w-ok-bg); color: var(--w-ok); }
  .pck-mortgage-calc .ma-note--warn { background: var(--w-warn-bg); color: var(--w-warn); }
  .pck-mortgage-calc .ma-note--bad { background: var(--w-bad-bg); color: var(--w-bad); }

  .pck-mortgage-calc .ma-form { padding: 1.375rem; }
  .pck-mortgage-calc .ma-currency { margin-bottom: 1rem; }
  .pck-mortgage-calc .ma-currency > label {
    display: block;
    font-size: 0.8125rem;
    font-weight: 500;
    color: var(--w-muted);
    margin-bottom: 0.375rem;
  }
  .pck-mortgage-calc .ma-affix--cur {
    min-width: 2.25rem;
    justify-content: center;
  }
  .pck-mortgage-calc .ma-input input[type="number"] { text-align: left; }
  .pck-mortgage-calc .ma-fields {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.875rem 0.75rem;
  }
  .pck-mortgage-calc .ma-fields--stack { grid-template-columns: 1fr; }
  .pck-mortgage-calc .ma-field { display: flex; flex-direction: column; gap: 0.375rem; }
  .pck-mortgage-calc .ma-field--wide { grid-column: 1 / -1; }
  .pck-mortgage-calc .ma-field > span { font-size: 0.8125rem; font-weight: 500; color: var(--w-muted); }

  .pck-mortgage-calc .ma-input {
    display: flex;
    align-items: stretch;
    border: 1px solid var(--w-line);
    border-radius: 8px;
    background: var(--w-surface);
    overflow: hidden;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .pck-mortgage-calc .ma-input:focus-within {
    border-color: var(--w-accent);
    box-shadow: 0 0 0 3px rgba(30,58,95,0.12);
    background: #fff;
  }
  .pck-mortgage-calc .ma-affix {
    display: flex;
    align-items: center;
    padding: 0 0.625rem;
    font-size: 0.875rem;
    color: var(--w-muted);
    background: rgba(0,0,0,0.02);
    flex-shrink: 0;
  }
  .pck-mortgage-calc .ma-input input,
  .pck-mortgage-calc .ma-input select {
    flex: 1;
    min-width: 0;
    width: 100%;
    border: 0;
    background: transparent;
    padding: 0.625rem 0.75rem;
    font: inherit;
    font-size: 0.9375rem;
    font-weight: 500;
    color: var(--w-ink);
    outline: none;
    font-variant-numeric: tabular-nums;
  }
  .pck-mortgage-calc .ma-input--select select { cursor: pointer; }

  .pck-mortgage-calc .ma-more {
    margin-top: 1.125rem;
    padding-top: 1rem;
    border-top: 1px solid var(--w-line);
  }
  .pck-mortgage-calc .ma-more summary {
    cursor: pointer;
    list-style: none;
    font-size: 0.8125rem;
    font-weight: 600;
    color: var(--w-accent);
  }
  .pck-mortgage-calc .ma-more summary::-webkit-details-marker { display: none; }
  .pck-mortgage-calc .ma-more[open] summary { margin-bottom: 0.875rem; }

  .pck-mortgage-calc .ma-foot {
    margin: 0;
    padding: 0.75rem 1.375rem 1rem;
    font-size: 0.6875rem;
    color: var(--w-muted);
    text-align: center;
    border-top: 1px solid var(--w-line);
    background: var(--w-surface);
  }

  @media (max-width: 359px) {
    .pck-mortgage-calc .ma-fields { grid-template-columns: 1fr; }
  }

  @media (min-width: 640px) {
    .pck-mortgage-calc { max-width: 44rem; }
    .pck-mortgage-calc .ma-shell {
      display: grid;
      grid-template-columns: minmax(0, 11fr) minmax(0, 13fr);
    }
    .pck-mortgage-calc .ma-result {
      border-bottom: 0;
      border-right: 1px solid rgba(255,255,255,0.1);
      padding: 1.75rem 1.5rem;
    }
    .pck-mortgage-calc .ma-price { font-size: 2.25rem; }
    .pck-mortgage-calc .ma-form { padding: 1.75rem 1.5rem; }
  }
</style>

<script>
(function () {
  "use strict";
  var root = document.getElementById("pck-mortgage-calc");
  if (!root) return;

  var CUR_MAP = {
    USD: { locale: "en-US" }, EUR: { locale: "en-US" }, GBP: { locale: "en-GB" },
    CHF: { locale: "de-CH" }, CAD: { locale: "en-CA" }, AUD: { locale: "en-AU" },
    JPY: { locale: "ja-JP", frac: 0 }, SEK: { locale: "en-US", narrow: true },
    NOK: { locale: "en-US", narrow: true }, DKK: { locale: "en-US", narrow: true },
    PLN: { locale: "pl-PL" }, MXN: { locale: "es-MX" },
    BRL: { locale: "pt-BR" }, INR: { locale: "en-IN" }, SGD: { locale: "en-SG" },
    NZD: { locale: "en-NZ" }, AED: { locale: "en-AE" }, ZAR: { locale: "en-ZA" }
  };
  var curCode = "EUR", fmtWhole, fmtPrec;
  function setCurrency(code) {
    var cfg = CUR_MAP[code] || CUR_MAP.USD;
    curCode = CUR_MAP[code] ? code : "USD";
    var frac = cfg.frac === 0 ? 0 : 2;
    function fmtOpts(digits) {
      var opts = { style: "currency", currency: curCode, maximumFractionDigits: digits, minimumFractionDigits: digits };
      if (cfg.narrow) opts.currencyDisplay = "narrowSymbol";
      return opts;
    }
    fmtWhole = new Intl.NumberFormat(cfg.locale, fmtOpts(0));
    fmtPrec = new Intl.NumberFormat(cfg.locale, fmtOpts(frac));
  }
  function curSymbol(code) {
    var c = code || curCode, cfg = CUR_MAP[c] || CUR_MAP.USD;
    var part = new Intl.NumberFormat(cfg.locale, { style: "currency", currency: CUR_MAP[c] ? c : "USD", currencyDisplay: "narrowSymbol" }).formatToParts(0);
    for (var i = 0; i < part.length; i++) if (part[i].type === "currency") return part[i].value;
    return c;
  }
  function curOptionLabel(code) {
    var cfg = CUR_MAP[code];
    var opts = { style: "currency", currency: code };
    if (cfg.narrow) opts.currencyDisplay = "narrowSymbol";
    var sample = new Intl.NumberFormat(cfg.locale, opts).format(1234.56);
    return code + " — " + sample;
  }
  function syncAffixes() {
    var sym = curSymbol();
    root.querySelectorAll(".ma-affix--cur").forEach(function (el) { el.textContent = sym; });
  }

  var currencySelect = root.querySelector("#pck-ma-currency");
  Object.keys(CUR_MAP).forEach(function (code) {
    var opt = document.createElement("option");
    opt.value = code;
    opt.textContent = curOptionLabel(code);
    currencySelect.appendChild(opt);
  });
  currencySelect.addEventListener("change", function () {
    setCurrency(currencySelect.value);
    syncAffixes();
    calculate();
  });

  var pct = function (n) { return (n * 100).toFixed(1) + "%"; };
  var ids = ["pck-ma-income","pck-ma-debts","pck-ma-down","pck-ma-rate","pck-ma-term","pck-ma-tax","pck-ma-insurance","pck-ma-hoa"];
  var STORE = "pck-mortgage";
  function saveState() {
    var d = { currency: currencySelect.value };
    ids.forEach(function (id) { d[id] = root.querySelector("#" + id).value; });
    try { localStorage.setItem(STORE, JSON.stringify(d)); } catch (e) {}
    if (history.replaceState) {
      try {
        var q = new URLSearchParams(d).toString();
        history.replaceState(null, "", location.pathname + (q ? "?" + q : ""));
      } catch (e) {}
    }
  }
  function loadState() {
    var fromUrl = new URLSearchParams(location.search);
    var fromStore = null;
    try { fromStore = JSON.parse(localStorage.getItem(STORE) || "null"); } catch (e) {}
    function pick(key) {
      var u = fromUrl.get(key);
      if (u !== null && u !== "") return u;
      if (fromStore && fromStore[key] != null) return fromStore[key];
      return null;
    }
    ids.forEach(function (id) {
      var v = pick(id);
      if (v !== null) root.querySelector("#" + id).value = v;
    });
    var cur = pick("currency");
    if (cur && CUR_MAP[cur]) { currencySelect.value = cur; setCurrency(cur); syncAffixes(); }
  }
  var out = {
    price: root.querySelector("#pck-ma-out-price"),
    loan: root.querySelector("#pck-ma-out-loan"),
    total: root.querySelector("#pck-ma-out-total"),
    front: root.querySelector("#pck-ma-out-front"),
    back: root.querySelector("#pck-ma-out-back"),
    barFront: root.querySelector("#pck-ma-bar-front"),
    barBack: root.querySelector("#pck-ma-bar-back"),
    status: root.querySelector("#pck-ma-out-status")
  };
  function num(id) {
    var v = parseFloat(root.querySelector("#" + id).value);
    return isNaN(v) || v < 0 ? 0 : v;
  }
  function loanFromPayment(payment, annualRate, years) {
    if (payment <= 0 || years <= 0) return 0;
    var r = annualRate / 100 / 12, n = years * 12;
    return r === 0 ? payment * n : payment * (Math.pow(1 + r, n) - 1) / (r * Math.pow(1 + r, n));
  }
  function setBar(el, ratio, cap) {
    el.style.width = Math.min(ratio / cap * 100, 100) + "%";
    el.className = "ma-bar-fill";
    if (ratio > cap) el.classList.add("ma-bar-fill--bad");
    else if (ratio > cap * 0.9) el.classList.add("ma-bar-fill--warn");
  }
  function calculate() {
    var income = num("pck-ma-income"), debts = num("pck-ma-debts"), down = num("pck-ma-down");
    var rate = num("pck-ma-rate"), term = parseInt(root.querySelector("#pck-ma-term").value, 10) || 30;
    var taxMo = num("pck-ma-tax") / 12, ins = num("pck-ma-insurance"), hoa = num("pck-ma-hoa");
    var monthlyIncome = income / 12;
    var maxHousing = Math.max(0, Math.min(monthlyIncome * 0.28, monthlyIncome * 0.36 - debts));
    var maxPI = Math.max(0, maxHousing - taxMo - ins - hoa);
    var maxLoan = loanFromPayment(maxPI, rate, term), homePrice = maxLoan + down;
    var frontDTI = monthlyIncome > 0 ? maxHousing / monthlyIncome : 0;
    var backDTI = monthlyIncome > 0 ? (maxHousing + debts) / monthlyIncome : 0;
    out.price.textContent = fmtWhole.format(homePrice);
    out.loan.textContent = fmtWhole.format(maxLoan);
    out.total.textContent = fmtPrec.format(maxHousing);
    out.front.textContent = pct(frontDTI);
    out.back.textContent = pct(backDTI);
    setBar(out.barFront, frontDTI, 0.28);
    setBar(out.barBack, backDTI, 0.36);
    out.status.className = "ma-note";
    if (backDTI <= 0.36 && frontDTI <= 0.28) {
      out.status.classList.add("ma-note--ok");
      out.status.textContent = "Within typical 28/36 lender guidelines";
    } else if (backDTI <= 0.43) {
      out.status.classList.add("ma-note--warn");
      out.status.textContent = "Near upper limits — confirm with your lender";
    } else {
      out.status.classList.add("ma-note--bad");
      out.status.textContent = "May exceed typical lender limits";
    }
    saveState();
  }
  ids.forEach(function (id) {
    var el = root.querySelector("#" + id);
    el.addEventListener("input", calculate);
    el.addEventListener("change", calculate);
  });
  setCurrency("EUR");
  currencySelect.value = "EUR";
  syncAffixes();
  loadState();
  calculate();
})();
</script>

</body>
</html>
