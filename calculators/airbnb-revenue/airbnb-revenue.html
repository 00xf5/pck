<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Airbnb Revenue Estimator</title>
  <style>
    body:has(> .pck-airbnb-calc) {
      margin: 0; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center;
      padding: 2rem 1.25rem; background: #fafaf9;
    }
  </style>
</head>
<body>

<div class="pck-airbnb-calc" id="pck-airbnb-calc">

  <div class="ab-shell">
    <div class="ab-result">
      <div class="ab-period" role="group" aria-label="Period">
        <button type="button" class="ab-period-btn ab-period-btn--on" data-days="30">Monthly</button>
        <button type="button" class="ab-period-btn" data-days="365">Annual</button>
      </div>
      <p class="ab-kicker">Estimated net income</p>
      <p class="ab-net">
        <span class="ab-net-value" id="pck-ab-out-net">—</span>
        <span class="ab-net-unit">/ <span id="pck-ab-period-label">month</span></span>
      </p>
      <dl class="ab-breakdown">
        <div><dt>Gross revenue</dt><dd id="pck-ab-out-gross">—</dd></div>
        <div><dt>Booked nights</dt><dd id="pck-ab-out-nights">—</dd></div>
      </dl>
      <div class="ab-stack" aria-label="Revenue breakdown">
        <div class="ab-stack-bar">
          <span class="ab-stack-seg ab-stack-seg--gross" id="pck-ab-wf-gross"></span>
          <span class="ab-stack-seg ab-stack-seg--fees" id="pck-ab-wf-fees"></span>
          <span class="ab-stack-seg ab-stack-seg--opex" id="pck-ab-wf-opex"></span>
          <span class="ab-stack-seg ab-stack-seg--net" id="pck-ab-wf-net"></span>
        </div>
        <ul class="ab-stack-key">
          <li><i class="ab-swatch ab-swatch--gross"></i>Gross</li>
          <li><i class="ab-swatch ab-swatch--fees"></i>Platform fees</li>
          <li><i class="ab-swatch ab-swatch--opex"></i>Fixed costs</li>
          <li><i class="ab-swatch ab-swatch--net"></i>Net</li>
        </ul>
      </div>
    </div>

    <div class="ab-form">
      <div class="ab-currency">
        <label for="pck-ab-currency">Currency</label>
        <div class="ab-input ab-input--select">
          <select id="pck-ab-currency" aria-label="Currency"></select>
        </div>
      </div>
      <label class="ab-range">
        <span class="ab-range-head"><span>Nightly rate</span><output id="pck-ab-rate-out">$185</output></span>
        <input type="range" id="pck-ab-rate" min="50" max="500" step="5" value="185">
      </label>
      <label class="ab-range">
        <span class="ab-range-head"><span>Occupancy</span><output id="pck-ab-occ-out">72%</output></span>
        <input type="range" id="pck-ab-occ" min="20" max="95" step="1" value="72">
      </label>

      <details class="ab-more">
        <summary>Fees &amp; expenses</summary>
        <div class="ab-presets" role="group" aria-label="Platform fee presets">
          <button type="button" class="ab-preset ab-preset--on" data-fee="3">Direct 3%</button>
          <button type="button" class="ab-preset" data-fee="15">OTA 15%</button>
        </div>
        <div class="ab-fields">
          <label class="ab-field"><span>Avg. stay</span><div class="ab-input"><input type="number" id="pck-ab-stay" value="3" min="1" max="30"><span class="ab-affix">nights</span></div></label>
          <label class="ab-field"><span>Cleaning fee</span><div class="ab-input"><span class="ab-affix ab-affix--cur"></span><input type="number" id="pck-ab-clean" value="75" min="0" step="5"></div></label>
          <label class="ab-field"><span>Fixed costs</span><div class="ab-input"><span class="ab-affix ab-affix--cur"></span><input type="number" id="pck-ab-expense" value="350" min="0" step="25"><span class="ab-affix">/mo</span></div></label>
          <label class="ab-field"><span>Platform fee</span><div class="ab-input"><input type="number" id="pck-ab-fee" value="3" min="0" max="50" step="0.5"><span class="ab-affix">%</span></div></label>
          <label class="ab-field ab-field--wide"><span>Listings</span><div class="ab-input"><input type="number" id="pck-ab-units" value="1" min="1" max="99"></div></label>
        </div>
      </details>
    </div>
  </div>

  <p class="ab-foot">Estimates only — varies by market and season.</p>
  <input type="hidden" id="pck-ab-period" value="30">
</div>

<style>
  .pck-airbnb-calc {
    --w-bg: #fff;
    --w-surface: #fafaf9;
    --w-ink: #1c1917;
    --w-muted: #78716c;
    --w-accent: #44403c;
    --w-gold: #92690e;
    --w-line: #e7e5e4;
    width: 100%;
    max-width: 26rem;
    border: 1px solid var(--w-line);
    border-radius: 12px;
    background: var(--w-bg);
    box-shadow: 0 1px 3px rgba(28,25,23,0.06), 0 8px 24px rgba(28,25,23,0.06);
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    font-size: 15px;
    color: var(--w-ink);
    overflow: hidden;
  }
  .pck-airbnb-calc *, .pck-airbnb-calc *::before, .pck-airbnb-calc *::after { box-sizing: border-box; }

  .pck-airbnb-calc .ab-shell { display: flex; flex-direction: column; }

  .pck-airbnb-calc .ab-result {
    padding: 1.5rem 1.375rem;
    background: var(--w-surface);
    border-bottom: 1px solid var(--w-line);
  }

  .pck-airbnb-calc .ab-period {
    display: inline-flex;
    padding: 2px;
    margin-bottom: 1.125rem;
    background: #fff;
    border: 1px solid var(--w-line);
    border-radius: 8px;
  }
  .pck-airbnb-calc .ab-period-btn {
    border: 0;
    background: transparent;
    color: var(--w-muted);
    font: inherit;
    font-size: 0.75rem;
    font-weight: 600;
    padding: 0.375rem 0.875rem;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .pck-airbnb-calc .ab-period-btn--on {
    background: var(--w-accent);
    color: #fff;
  }

  .pck-airbnb-calc .ab-kicker {
    margin: 0 0 0.25rem;
    font-size: 0.8125rem;
    font-weight: 500;
    color: var(--w-muted);
  }
  .pck-airbnb-calc .ab-net {
    margin: 0 0 1rem;
    display: flex;
    align-items: baseline;
    gap: 0.375rem;
    flex-wrap: wrap;
  }
  .pck-airbnb-calc .ab-net-value {
    font-family: Georgia, "Times New Roman", serif;
    font-size: 2rem;
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    color: var(--w-ink);
  }
  .pck-airbnb-calc .ab-net-unit { font-size: 0.9375rem; color: var(--w-muted); }

  .pck-airbnb-calc .ab-breakdown {
    margin: 0 0 1rem;
    padding: 0;
    display: grid;
    gap: 0;
    border-top: 1px solid var(--w-line);
  }
  .pck-airbnb-calc .ab-breakdown > div {
    display: flex;
    justify-content: space-between;
    gap: 1rem;
    padding: 0.5rem 0;
    border-bottom: 1px solid var(--w-line);
    font-size: 0.8125rem;
  }
  .pck-airbnb-calc .ab-breakdown dt { margin: 0; color: var(--w-muted); font-weight: 400; }
  .pck-airbnb-calc .ab-breakdown dd { margin: 0; font-weight: 600; font-variant-numeric: tabular-nums; }

  .pck-airbnb-calc .ab-stack-bar {
    display: flex;
    height: 8px;
    border-radius: 999px;
    overflow: hidden;
    background: var(--w-line);
    gap: 1px;
  }
  .pck-airbnb-calc .ab-stack-seg {
    flex: 0;
    min-width: 0;
    transition: flex 0.35s ease;
  }
  .pck-airbnb-calc .ab-stack-seg--gross { background: #d6d3d1; }
  .pck-airbnb-calc .ab-stack-seg--fees { background: #fbbf24; }
  .pck-airbnb-calc .ab-stack-seg--opex { background: #f87171; }
  .pck-airbnb-calc .ab-stack-seg--net { background: var(--w-gold); }

  .pck-airbnb-calc .ab-stack-key {
    list-style: none;
    margin: 0.5rem 0 0;
    padding: 0;
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem 0.875rem;
    font-size: 0.6875rem;
    color: var(--w-muted);
  }
  .pck-airbnb-calc .ab-stack-key li { display: flex; align-items: center; gap: 0.375rem; }
  .pck-airbnb-calc .ab-swatch {
    width: 8px;
    height: 8px;
    border-radius: 2px;
    flex-shrink: 0;
  }
  .pck-airbnb-calc .ab-swatch--gross { background: #d6d3d1; }
  .pck-airbnb-calc .ab-swatch--fees { background: #fbbf24; }
  .pck-airbnb-calc .ab-swatch--opex { background: #f87171; }
  .pck-airbnb-calc .ab-swatch--net { background: var(--w-gold); }

  .pck-airbnb-calc .ab-form { padding: 1.375rem; }
  .pck-airbnb-calc .ab-currency { margin-bottom: 1.125rem; }
  .pck-airbnb-calc .ab-currency > label {
    display: block;
    font-size: 0.8125rem;
    font-weight: 500;
    color: var(--w-muted);
    margin-bottom: 0.375rem;
  }
  .pck-airbnb-calc .ab-input--select select {
    width: 100%;
    border: 0;
    background: transparent;
    padding: 0.625rem 0.75rem;
    font: inherit;
    font-size: 0.875rem;
    color: var(--w-ink);
    outline: none;
    cursor: pointer;
  }
  .pck-airbnb-calc .ab-affix--cur {
    min-width: 2.25rem;
    justify-content: center;
  }
  .pck-airbnb-calc .ab-input input[type="number"] { text-align: left; }
  .pck-airbnb-calc .ab-range { display: block; margin-bottom: 1.25rem; }
  .pck-airbnb-calc .ab-range-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.625rem;
    font-size: 0.8125rem;
    font-weight: 600;
  }
  .pck-airbnb-calc .ab-range-head output {
    font-size: 0.9375rem;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    color: var(--w-ink);
  }

  .pck-airbnb-calc .ab-range input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 6px;
    border-radius: 999px;
    margin: 0;
    cursor: pointer;
    background: linear-gradient(to right, var(--w-accent) var(--pct, 50%), var(--w-line) var(--pct, 50%));
  }
  .pck-airbnb-calc .ab-range input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #fff;
    border: 2px solid var(--w-accent);
    box-shadow: 0 1px 4px rgba(0,0,0,0.12);
    cursor: grab;
  }
  .pck-airbnb-calc .ab-range input[type="range"]::-moz-range-thumb {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #fff;
    border: 2px solid var(--w-accent);
    cursor: grab;
  }

  .pck-airbnb-calc .ab-more {
    border-top: 1px solid var(--w-line);
    padding-top: 1rem;
  }
  .pck-airbnb-calc .ab-more summary {
    cursor: pointer;
    list-style: none;
    font-size: 0.8125rem;
    font-weight: 600;
    color: var(--w-accent);
  }
  .pck-airbnb-calc .ab-more summary::-webkit-details-marker { display: none; }
  .pck-airbnb-calc .ab-more[open] summary { margin-bottom: 0.875rem; }

  .pck-airbnb-calc .ab-presets { display: flex; gap: 0.5rem; margin-bottom: 0.75rem; }
  .pck-airbnb-calc .ab-preset {
    flex: 1;
    border: 1px solid var(--w-line);
    background: var(--w-surface);
    font: inherit;
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--w-muted);
    padding: 0.5rem;
    border-radius: 6px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  .pck-airbnb-calc .ab-preset:hover { border-color: var(--w-accent); color: var(--w-ink); }
  .pck-airbnb-calc .ab-preset--on { border-color: var(--w-accent); background: var(--w-accent); color: #fff; }

  .pck-airbnb-calc .ab-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
  .pck-airbnb-calc .ab-field { display: flex; flex-direction: column; gap: 0.375rem; }
  .pck-airbnb-calc .ab-field--wide { grid-column: 1 / -1; }
  .pck-airbnb-calc .ab-field > span { font-size: 0.8125rem; font-weight: 500; color: var(--w-muted); }

  .pck-airbnb-calc .ab-input {
    display: flex;
    align-items: stretch;
    border: 1px solid var(--w-line);
    border-radius: 8px;
    background: var(--w-surface);
    overflow: hidden;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .pck-airbnb-calc .ab-input:focus-within {
    border-color: var(--w-accent);
    box-shadow: 0 0 0 3px rgba(68,64,60,0.1);
    background: #fff;
  }
  .pck-airbnb-calc .ab-affix {
    display: flex;
    align-items: center;
    padding: 0 0.625rem;
    font-size: 0.8125rem;
    color: var(--w-muted);
    flex-shrink: 0;
  }
  .pck-airbnb-calc .ab-input input {
    flex: 1;
    min-width: 0;
    border: 0;
    background: transparent;
    padding: 0.625rem 0.75rem;
    font: inherit;
    font-size: 0.9375rem;
    font-weight: 500;
    color: var(--w-ink);
    outline: none;
    font-variant-numeric: tabular-nums;
  }

  .pck-airbnb-calc .ab-foot {
    margin: 0;
    padding: 0.75rem 1.375rem 1rem;
    font-size: 0.6875rem;
    color: var(--w-muted);
    text-align: center;
    border-top: 1px solid var(--w-line);
    background: var(--w-surface);
  }

  @media (max-width: 359px) {
    .pck-airbnb-calc .ab-fields { grid-template-columns: 1fr; }
  }

  @media (min-width: 640px) {
    .pck-airbnb-calc { max-width: 44rem; }
    .pck-airbnb-calc .ab-shell {
      display: grid;
      grid-template-columns: minmax(0, 11fr) minmax(0, 13fr);
    }
    .pck-airbnb-calc .ab-result {
      border-bottom: 0;
      border-right: 1px solid var(--w-line);
      padding: 1.75rem 1.5rem;
    }
    .pck-airbnb-calc .ab-net-value { font-size: 2.25rem; }
    .pck-airbnb-calc .ab-form { padding: 1.75rem 1.5rem; }
  }
</style>

<script>
(function () {
  "use strict";
  var root = document.getElementById("pck-airbnb-calc");
  if (!root) return;

  var CUR_MAP = {
    USD: { locale: "en-US" }, EUR: { locale: "de-DE" }, GBP: { locale: "en-GB" },
    CHF: { locale: "de-CH" }, CAD: { locale: "en-CA" }, AUD: { locale: "en-AU" },
    JPY: { locale: "ja-JP", frac: 0 }, SEK: { locale: "sv-SE" }, NOK: { locale: "nb-NO" },
    DKK: { locale: "da-DK" }, PLN: { locale: "pl-PL" }, MXN: { locale: "es-MX" },
    BRL: { locale: "pt-BR" }, INR: { locale: "en-IN" }, SGD: { locale: "en-SG" },
    NZD: { locale: "en-NZ" }, AED: { locale: "en-AE" }, ZAR: { locale: "en-ZA" }
  };
  var curCode = "USD", fmtWhole, fmtPrec, fmtNum, curLocale = "en-US";
  function setCurrency(code) {
    var cfg = CUR_MAP[code] || CUR_MAP.USD;
    curCode = CUR_MAP[code] ? code : "USD";
    curLocale = cfg.locale;
    var frac = cfg.frac === 0 ? 0 : 2;
    fmtWhole = new Intl.NumberFormat(cfg.locale, { style: "currency", currency: curCode, maximumFractionDigits: 0, minimumFractionDigits: 0 });
    fmtPrec = new Intl.NumberFormat(cfg.locale, { style: "currency", currency: curCode, maximumFractionDigits: frac, minimumFractionDigits: frac });
    fmtNum = new Intl.NumberFormat(cfg.locale);
  }
  function curSymbol(code) {
    var c = code || curCode, cfg = CUR_MAP[c] || CUR_MAP.USD;
    var part = new Intl.NumberFormat(cfg.locale, { style: "currency", currency: CUR_MAP[c] ? c : "USD", currencyDisplay: "narrowSymbol" }).formatToParts(0);
    for (var i = 0; i < part.length; i++) if (part[i].type === "currency") return part[i].value;
    return c;
  }
  function curOptionLabel(code) {
    var cfg = CUR_MAP[code];
    return code + " — " + new Intl.NumberFormat(cfg.locale, { style: "currency", currency: code }).format(1234.56);
  }
  function syncAffixes() {
    var sym = curSymbol();
    root.querySelectorAll(".ab-affix--cur").forEach(function (el) { el.textContent = sym; });
  }

  var currencySelect = root.querySelector("#pck-ab-currency");
  Object.keys(CUR_MAP).forEach(function (code) {
    var opt = document.createElement("option");
    opt.value = code;
    opt.textContent = curOptionLabel(code);
    currencySelect.appendChild(opt);
  });
  currencySelect.addEventListener("change", function () {
    setCurrency(currencySelect.value);
    syncAffixes();
    calculate();
  });

  var periodInput = root.querySelector("#pck-ab-period");
  var rateSlider = root.querySelector("#pck-ab-rate");
  var occSlider = root.querySelector("#pck-ab-occ");
  var out = {
    net: root.querySelector("#pck-ab-out-net"),
    periodLabel: root.querySelector("#pck-ab-period-label"),
    rateOut: root.querySelector("#pck-ab-rate-out"),
    occOut: root.querySelector("#pck-ab-occ-out"),
    nights: root.querySelector("#pck-ab-out-nights"),
    gross: root.querySelector("#pck-ab-out-gross"),
    wfGross: root.querySelector("#pck-ab-wf-gross"),
    wfFees: root.querySelector("#pck-ab-wf-fees"),
    wfOpex: root.querySelector("#pck-ab-wf-opex"),
    wfNet: root.querySelector("#pck-ab-wf-net")
  };
  function setSliderFill(el) {
    var min = +el.min, max = +el.max, val = +el.value;
    el.style.setProperty("--pct", ((val - min) / (max - min) * 100).toFixed(1) + "%");
  }
  function num(id) {
    var el = root.querySelector("#" + id);
    if (!el) return 0;
    var v = parseFloat(el.value);
    return isNaN(v) || v < 0 ? 0 : v;
  }
  function setStack(gross, fees, opex, net) {
    out.wfGross.style.flex = gross;
    out.wfFees.style.flex = fees;
    out.wfOpex.style.flex = opex;
    out.wfNet.style.flex = Math.max(0, net);
  }
  function calculate() {
    var rate = num("pck-ab-rate"), occ = Math.min(100, num("pck-ab-occ")) / 100;
    var days = parseInt(periodInput.value, 10) || 30;
    var stayLen = Math.max(1, num("pck-ab-stay")), clean = num("pck-ab-clean");
    var expenseMo = num("pck-ab-expense"), feePct = num("pck-ab-fee") / 100;
    var units = Math.max(1, Math.floor(num("pck-ab-units")));
    setSliderFill(rateSlider);
    setSliderFill(occSlider);
    out.rateOut.textContent = fmtPrec.format(rate);
    out.occOut.textContent = Math.round(occ * 100) + "%";
    out.periodLabel.textContent = days === 365 ? "year" : "month";
    var bookedNights = Math.round(days * occ) * units;
    var stays = bookedNights > 0 ? Math.round(bookedNights / stayLen) : 0;
    var gross = bookedNights * rate + stays * clean;
    var fees = gross * feePct, opex = days === 365 ? expenseMo * 12 : expenseMo;
    var net = Math.max(0, gross - fees - opex);
    out.net.textContent = fmtWhole.format(net);
    out.nights.textContent = fmtNum.format(bookedNights);
    out.gross.textContent = fmtWhole.format(gross);
    setStack(gross, fees, opex, net);
  }
  ["pck-ab-stay","pck-ab-clean","pck-ab-expense","pck-ab-fee","pck-ab-units"].forEach(function (id) {
    root.querySelector("#" + id).addEventListener("input", calculate);
  });
  rateSlider.addEventListener("input", calculate);
  occSlider.addEventListener("input", calculate);
  root.querySelectorAll(".ab-period-btn").forEach(function (btn) {
    btn.addEventListener("click", function () {
      root.querySelectorAll(".ab-period-btn").forEach(function (b) { b.classList.remove("ab-period-btn--on"); });
      btn.classList.add("ab-period-btn--on");
      periodInput.value = btn.getAttribute("data-days");
      calculate();
    });
  });
  root.querySelectorAll(".ab-preset").forEach(function (btn) {
    btn.addEventListener("click", function () {
      root.querySelector("#pck-ab-fee").value = btn.getAttribute("data-fee");
      root.querySelectorAll(".ab-preset").forEach(function (b) { b.classList.remove("ab-preset--on"); });
      btn.classList.add("ab-preset--on");
      calculate();
    });
  });
  setCurrency("USD");
  currencySelect.value = "USD";
  syncAffixes();
  calculate();
})();
</script>

</body>
</html>
