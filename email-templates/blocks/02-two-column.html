<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="x-apple-disable-message-reformatting">
  <title>PCK — Email Block 02: Two Column</title>
  <style>
    body { margin: 0; padding: 0; background-color: #f5f0eb; }
    img { border: 0; display: block; max-width: 100%; height: auto; }
    @media only screen and (max-width: 620px) {
      .pck-col { display: block !important; width: 100% !important; max-width: 100% !important; }
      .pck-col-img { padding-bottom: 0 !important; }
      .pck-col-text { padding-top: 20px !important; }
      .pck-pad { padding-left: 20px !important; padding-right: 20px !important; }
    }
  </style>
</head>
<body style="margin:0;padding:0;background-color:#f5f0eb;">

<!-- PASTE START — Block 02: Two column image + text -->
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#f5f0eb;">
  <tr>
    <td align="center" style="padding:24px 12px;">
      <table role="presentation" class="pck-email-split" width="600" cellpadding="0" cellspacing="0" border="0" style="width:600px;max-width:600px;background-color:#ffffff;border:1px solid #e7e5e4;">

        <tr>
          <td class="pck-pad" style="padding:36px 40px 32px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
            <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
              <tr>
                <td class="pck-col pck-col-img" width="260" valign="top" style="width:260px;padding-right:20px;vertical-align:top;">
                  <img src="https://images.unsplash.com/photo-1600607687939-ce8a6c25118c?w=600&q=85" width="260" alt="Suite interior" style="width:100%;max-width:260px;border-radius:4px;">
                </td>
                <td class="pck-col pck-col-text" valign="top" style="vertical-align:top;">
                  <p style="margin:0 0 8px;font-size:11px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:#a6833d;">The Garden Suite</p>
                  <h2 style="margin:0 0 12px;font-size:22px;font-weight:600;line-height:28px;letter-spacing:-0.01em;color:#1c1917;">Quiet mornings, vineyard light</h2>
                  <p style="margin:0 0 16px;font-size:14px;line-height:22px;color:#78716c;">King bed, private terrace, and a view that does not need a filter. Breakfast is prepared on request — we keep the pace unhurried.</p>
                  <p style="margin:0;font-size:14px;line-height:22px;">
                    <a href="https://example.com/suites" style="color:#1e3a5f;font-weight:600;text-decoration:none;">See the suite →</a>
                  </p>
                </td>
              </tr>
            </table>
          </td>
        </tr>

      </table>
    </td>
  </tr>
</table>
<!-- PASTE END -->

</body>
</html>
